name: Build PuLID-Flux RunPod Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "handler.py"
      - "requirements.txt"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: horrorme/pulid-flux-image

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space (removes ~15GB of unused tools)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DOCKER_HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          timeout-minutes: 90

      - name: Make package public
        run: |
          # This repo is public, so GITHUB_TOKEN can make the GHCR package public.
          STATUS=$(curl -s -o /tmp/pkg.txt -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/pulid-flux-image" \
            -d '{"visibility":"public"}')
          echo "Package visibility PATCH: HTTP $STATUS"
          cat /tmp/pkg.txt

      - name: Output image reference
        run: |
          echo "Image: ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "RunPod template hcs3muokzb: update imageName to ghcr.io/${{ env.IMAGE_NAME }}:latest"
          echo "Endpoint: cl638uz0qsft5p"
